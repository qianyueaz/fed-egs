experiment_name: fedegssg_cifar10
output_dir: ./artifacts

dataset:
  name: cifar10
  root: ./data
  partition_strategy: difficulty_skewed
  num_clients: 20
  simple_clients: 10
  complex_clients: 10
  hard_ratio: 0.30
  simple_easy_ratio: 0.90
  complex_easy_ratio: 0.30
  batch_size: 128
  num_workers: 8
  difficulty_checkpoint: ./artifacts/checkpoints/cifar10_resnet18_teacher.pt
  partition_cache_name: client_partitions.json
  dirichlet_alpha: 0.1
  longtail_major_classes: 3
  longtail_major_ratio: 0.9
  public_dataset_size: 2500
  public_split_strategy: per_class_ratio
  public_per_class_ratio: 0.05

federated:
  server_algorithm: fedegssg
  client_algorithm: sgd_expert_local
  compare_algorithms:
    - fedavg
  sequential_simulation: true
  rounds: 300
  clients_per_round: 10
  local_epochs: 12
  local_lr: 0.01
  local_momentum: 0.9
  local_weight_decay: 0.0005
  prox_mu: 0.001

  distill_epochs: 10
  distill_lr: 0.001
  distill_temperature: 3.0
  public_ce_weight: 1.0
  public_logit_align_weight: 1.0
  external_logit_align_weight: 0.08
  external_logit_align_warmup_rounds: 120
  external_logit_align_ramp_rounds: 60
  public_teacher_aggregation: avg_logits
  external_teacher_aggregation: avg_logits
  public_teacher_use_temporal: false
  external_teacher_use_temporal: false
  hard_subset_ratio: 0.0
  hard_subset_kd_boost: 0.0
  general_deploy_ema_momentum: 0.90
  general_deploy_warmup_rounds: 80
  general_deploy_warmup_momentum: 0.35
  deploy_consistency_weight: 0.0
  deploy_consistency_warmup_rounds: 80
  deploy_consistency_ramp_rounds: 40
  distill_dataset: cifar100
  distill_dataset_root: ./data
  distill_max_samples: 10000

  general_pretrain_on_public: true
  general_pretrain_epochs: 20
  general_pretrain_lr: 0.01
  general_pretrain_imagenet_init: false

  expert_kd_weight: 0.10
  expert_kd_temperature: 3.0
  expert_kd_warmup_rounds: 80
  expert_kd_min_general_accuracy: 0.75
  expert_kd_confidence_threshold: 0.60
  expert_kd_margin_threshold: 0.05
  expert_kd_hard_boost: 0.25
  expert_kd_teacher_confidence_delta: 0.02
  expert_kd_teacher_margin_delta: 0.02
  expert_kd_student_confidence_ceiling: 0.88
  expert_kd_student_margin_ceiling: 0.30
  expert_kd_gate_power: 1.00
  expert_kd_target_coverage: 0.15
  expert_kd_adaptive_coverage_enabled: true
  expert_kd_min_gate_ratio: 0.10
  expert_kd_gate_floor: 0.05
  expert_refresh_epochs: 1
  expert_refresh_lr_scale: 0.25
  expert_refresh_min_teacher_accuracy: 0.76
  expert_refresh_confidence_threshold: 0.65
  expert_refresh_margin_threshold: 0.06
  expert_refresh_logit_weight: 0.02
  expert_refresh_feature_hint_weight: 0.01
  expert_refresh_hard_boost: 0.10
  expert_refresh_target_coverage: 0.10
  expert_refresh_adaptive_coverage_enabled: true
  expert_refresh_min_gate_ratio: 0.08
  expert_refresh_gate_floor: 0.05
  client_feature_hint_weight: 0.01

  reliability_ema_momentum: 0.80
  reliability_accuracy_weight: 0.70
  reliability_alpha: 1.0
  min_client_reliability: 0.05
  teacher_consistency_weight: 1.0
  teacher_temporal_buffer_size: 5
  teacher_temporal_momentum: 0.15
  temperature_calibration_enabled: true
  temperature_calibration_frequency: 5
  temperature_calibration_min: 0.85
  temperature_calibration_max: 2.5
  temperature_calibration_candidates: 11
  temperature_calibration_momentum: 0.5
  hard_sample_topk: 3
  hard_sample_disagreement_threshold: 0.25
  hard_sample_entropy_threshold: 0.50
  hard_sample_weight_power: 1.25
  hard_sample_distill_boost: 1.20

  communication_quantization_enabled: true
  communication_quantization_bits: 8
  restore_best_checkpoint: true
  device: cuda
  seed: 42

model:
  architecture: small_cnn
  general_architecture: teacher_resnet18
  expert_architecture: small_cnn
  num_classes: 10
  general_width: 1.0
  general_base_channels: 32
  expert_width: 0.25
  expert_base_channels: 32
  knowledge_dim: 512
  baseline_architecture: small_cnn
  baseline_width: 0.25
  baseline_base_channels: 32

inference:
  routing_policy: expert_first_general_fallback
  confidence_threshold: 0.55
  high_threshold: 0.55
  low_threshold: 0.55
  route_distance_threshold: 0.04
  route_energy_threshold: -3.10
  min_confidence_threshold: 0.35
  max_confidence_threshold: 0.80
  min_margin_threshold: 0.00
  max_margin_threshold: 0.08
  min_energy_threshold: -5.50
  max_energy_threshold: -1.80
  personalized_threshold_step: 0.01
  personalized_margin_step: 0.005
  personalized_energy_step: 0.10
  target_general_invocation_rate: 0.20
  simple_target_general_invocation_rate: 0.34
  complex_target_general_invocation_rate: 0.52
  route_hard_recall_tolerance: 0.005
  routing_search_radius: 3
  route_hard_priority_margin: 0.005
  route_hard_confidence_delta: 0.02
  route_hard_margin_delta: 0.01
  route_hard_energy_delta: 0.10
  route_warmup_rounds: 40
  route_warmup_confidence_threshold: 0.70
  route_disable_distance_during_warmup: true
  route_reliability_center: 0.60
  route_reliability_confidence_scale: 0.08
  route_reliability_margin_scale: 0.015
  route_reliability_energy_scale: 0.20
  route_reliability_invocation_scale: 0.05
  route_reliability_hard_bonus: 0.01
  route_gain_threshold: 0.00
  min_route_gain_threshold: -1.00
  max_route_gain_threshold: 0.70
  route_gain_threshold_step: 0.05
  route_gain_search_warmup_rounds: 120
  route_min_invocation_rate_scale: 0.50
  route_gain_confidence_weight: 0.60
  route_gain_margin_weight: 0.35
  route_gain_energy_weight: 0.25
  route_gain_reliability_weight: 0.15
  route_gain_positive_margin: 0.02
  routing_holdout_ratio: 0.10
  routing_holdout_min_samples: 32
  routing_holdout_max_samples: 256
