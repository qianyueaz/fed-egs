experiment_name: fedasym_cifar10
output_dir: ./artifacts

dataset:
  name: cifar10
  root: ./data
  partition_strategy: dirichlet
  num_clients: 20
  simple_clients: 10
  complex_clients: 10
  hard_ratio: 0.30
  simple_easy_ratio: 0.90
  complex_easy_ratio: 0.30
  batch_size: 128
  num_workers: 8
  difficulty_checkpoint: ./artifacts/checkpoints/cifar10_resnet18_teacher.pt
  partition_cache_name: client_partitions.json
  dirichlet_alpha: 0.2
  dirichlet_min_client_size: 32
  longtail_major_classes: 3
  longtail_major_ratio: 0.9
  public_dataset_size: 5000
  public_split_strategy: random
  public_per_class_ratio: 0.0

federated:
  server_algorithm: fedasym
  client_algorithm: sgd_expert_local
  compare_algorithms: []
  sequential_simulation: true
  rounds: 200
  clients_per_round: 10
  local_epochs: 5
  local_lr: 0.01
  local_momentum: 0.9
  local_weight_decay: 0.0005
  prox_mu: 0.001

  public_distill_epochs: 1
  distill_epochs: 5
  distill_lr: 0.001
  distill_temperature: 3.0
  expert_kd_temperature: 4.0
  uncertainty_alpha_min: 0.20
  uncertainty_alpha_max: 0.85

  calibration_ratio: 0.20
  calibration_min_samples: 32
  calibration_max_samples: 1024
  router_validation_ratio: 0.20
  risk_predictor_epochs: 80
  risk_predictor_lr: 0.001
  risk_predictor_weight_decay: 0.0
  risk_predictor_hidden_dim: 64
  risk_predictor_dropout: 0.10
  risk_predictor_retrain_on_load: false
  risk_predictor_hard_negative_enabled: true
  risk_predictor_hard_negative_quantile: 0.90
  risk_predictor_hard_negative_weight: 1.25
  risk_predictor_hard_negative_warmup_epochs: 40
  risk_predictor_tta_enabled: true
  route_disable_when_no_gain: true
  route_min_gain: 0.01
  route_gain_filter_min_invoked: 10
  route_gain_filter_require_positive_net: true
  router_group_mode: predicted_class
  router_group_filter_strategy: negative_net
  router_group_min_support: 5
  router_group_min_invoked: 2
  router_group_require_positive_net: true
  router_group_fallback_to_client: true
  router_group_threshold_mode: boost
  router_group_threshold_min_support: 20
  router_group_threshold_min_errors: 3
  router_group_threshold_min_predicted_positive: 3
  router_group_threshold_target_fpr: 0.10
  router_group_threshold_max_false_positive: 2
  router_group_threshold_boost: 0.05
  router_group_boost_min_support: 20
  router_group_boost_min_invoked: 4
  router_group_boost_max_net_rescue: 2.0
  router_group_boost_min_harm: 1

  dkdr_mu: 0.50
  general_pretrain_imagenet_init: false
  restore_best_checkpoint: true
  save_best_checkpoint: true
  recalibrate_route_thresholds_on_load: true
  device: cuda
  seed: 42

model:
  general_architecture: teacher_resnet18
  expert_architecture: small_cnn
  num_classes: 10
  expert_base_channels: 32

inference:
  routing_policy: two_stage_error_verifier
  error_predictor_threshold: 0.85
  error_predictor_threshold_mode: precision
  error_predictor_target_precision: 0.75
  error_predictor_target_fpr: 0.01
  error_predictor_max_false_positive: 5
  error_predictor_min_predicted_positive: 3
  error_predictor_disable_on_precision_fail: true
  error_predictor_use_wilson_lower_bound: false
  error_predictor_wilson_z: 1.96
  error_predictor_high_confidence_guard: 0.95
  router_regret_diagnostics_enabled: true
  router_candidate_diagnostics_enabled: true
  router_candidate_rates: [0.01, 0.02, 0.05, 0.10, 0.15, 0.20]
  router_candidate_rate: 0.10
  router_candidate_tta_weight: 0.10
  router_candidate_min_score: 0.0
  router_candidate_disable_high_confidence_guard: true
  router_candidate_confidence_bins_enabled: false
  router_candidate_confidence_bin_rates: [0.10, 0.10, 0.08, 0.04, 0.02]
  route_verifier_hidden_dim: 32
  route_verifier_dropout: 0.10
  route_verifier_epochs: 60
  route_verifier_lr: 0.001
  route_verifier_weight_decay: 0.0
  route_verifier_negative_weight: 1.5
  route_verifier_neutral_weight: 0.1
  route_verifier_threshold_mode: harm_constrained
  route_verifier_min_adopt_threshold: 0.20
  route_verifier_low_threshold_train_harm_ratio: 2.0
  route_verifier_low_threshold_train_harm_min_candidates: 10
  route_verifier_harm_lambda: 1.0
  route_verifier_adoption_mode: fusion
  route_verifier_confidence_bin_thresholds_enabled: false
  route_verifier_bin_min_validation_adopted: 2
  route_fusion_alpha_source: verifier
  route_fusion_alpha_min: 0.35
  route_fusion_alpha_max: 0.85
  route_fusion_alpha_fixed: 0.50
  route_fusion_confidence_alpha_enabled: true
  route_fusion_confidence_alpha_max_values: [0.85, 0.80, 0.70, 0.55, 0.45]
  router_max_harm_rate: 0.008
  router_min_rescue_harm_ratio: 1.0
  router_min_adopted: 2
  router_min_rescue: 1
  route_verifier_min_validation_adopted: 4
  route_verifier_min_validation_net: 0.0
  route_verifier_min_validation_rescue_harm_ratio: 1.0
  route_verifier_disable_on_validation_fail: true
