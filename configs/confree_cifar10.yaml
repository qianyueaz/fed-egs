experiment_name: confree_cifar10
output_dir: ./artifacts

dataset:
  name: cifar10
  root: ./data
  partition_strategy: dirichlet
  num_clients: 20
  simple_clients: 10
  complex_clients: 10
  hard_ratio: 0.30
  simple_easy_ratio: 0.90
  complex_easy_ratio: 0.30
  batch_size: 128
  num_workers: 8
  difficulty_checkpoint: ./artifacts/checkpoints/cifar10_resnet18_teacher.pt
  partition_cache_name: client_partitions.json
  dirichlet_alpha: 0.2
  dirichlet_min_client_size: 32
  longtail_major_classes: 3
  longtail_major_ratio: 0.9
  public_dataset_size: 0
  public_split_strategy: random
  public_per_class_ratio: 0.0

federated:
  server_algorithm: confree
  client_algorithm: sgd_expert_local
  compare_algorithms: []
  sequential_simulation: true
  rounds: 200
  clients_per_round: 10
  local_epochs: 5
  local_lr: 0.01
  local_momentum: 0.9
  local_weight_decay: 0.0005
  prox_mu: 0.001

  fedala_rand_percent: 0.80
  fedala_layer_idx: 0
  fedala_eta: 1.0
  fedala_init_alpha: 0.5
  fedala_convergence_threshold: 0.01
  fedala_start_phase_epochs: 5
  fedala_adaptation_epochs: 1

  confree_alpha: 0.5
  confree_solver_iterations: 80
  confree_solver_lr: 0.05

  device: cuda
  seed: 42

model:
  architecture: teacher_resnet18
  general_architecture: teacher_resnet18
  expert_architecture: small_cnn
  num_classes: 10
  general_width: 1.0
  general_base_channels: 32
  expert_width: 0.25
  expert_base_channels: 32
  baseline_architecture: small_cnn
  baseline_width: null
  baseline_base_channels: 32

inference:
  routing_policy: local_personalized_only
  confidence_threshold: 0.80
  high_threshold: 0.80
  low_threshold: 0.30
